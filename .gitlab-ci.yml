image: python:3.11

stages:
  - test
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

run-tests:
  stage: test
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - mkdir -p reports
    - python -m robot --outputdir reports --pythonpath . features/
  artifacts:
    when: always
    paths:
      - reports/log.html
      - reports/report.html
      - reports/output.xml
    expire_in: 7 days
  allow_failure: false

convert-results:
  stage: report
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - rebot --outputdir reports --xunit reports/xunit.xml reports/output.xml
  artifacts:
    when: always
    paths:
      - reports/xunit.xml
    reports:
      junit: reports/xunit.xml
    expire_in: 7 days
  allow_failure: true
  dependencies:
    - run-tests